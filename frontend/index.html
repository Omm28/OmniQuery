<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniQuery</title>
    <link rel="icon" type="image/png" href="/static/favicon3.png" />
    <meta
      name="description"
      content="AI-powered agent that answers from its own knowledge or searches the web for real-time information."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/static/style.css" />

    <style>
      /* ── Login screen ────────────────────────────────────────────────────── */
      #loginScreen {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 999;
        background: radial-gradient(ellipse at 50% 40%, rgba(99,102,241,.18) 0%, transparent 70%),
                    linear-gradient(135deg, #0d0d1a 0%, #0a0a14 100%);
        backdrop-filter: blur(2px);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 2rem;
      }
      #loginScreen.visible { display: flex; }

      .login-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 3rem 3.5rem;
        text-align: center;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 24px 80px rgba(0,0,0,.5);
      }
      .login-logo {
        font-size: 3rem;
        margin-bottom: 1rem;
        line-height: 1;
      }
      .login-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: #fff;
        margin: 0 0 .4rem;
      }
      .login-sub {
        color: rgba(255,255,255,.5);
        font-size: .9rem;
        margin: 0 0 2.2rem;
        line-height: 1.5;
      }
      .login-btn {
        display: inline-flex;
        align-items: center;
        gap: .65rem;
        background: #fff;
        color: #0d0d1a;
        font-weight: 600;
        font-size: .95rem;
        padding: .75rem 1.6rem;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: background .2s, transform .15s, box-shadow .2s;
        box-shadow: 0 4px 20px rgba(0,0,0,.3);
      }
      .login-btn:hover {
        background: #f0f0f0;
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(0,0,0,.4);
      }
      .login-btn svg { flex-shrink: 0; }

      /* ── User avatar / header controls ───────────────────────────────────── */
      #userWidget {
        display: none;
        align-items: center;
        gap: .6rem;
      }
      #userWidget.visible { display: flex; }
      .user-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1.5px solid rgba(255,255,255,.2);
        object-fit: cover;
      }
      .user-name {
        font-size: .85rem;
        color: rgba(255,255,255,.75);
        font-weight: 500;
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .logout-btn {
        font-size: .78rem;
        color: rgba(255,255,255,.4);
        background: none;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 6px;
        padding: .25rem .6rem;
        cursor: pointer;
        transition: color .2s, border-color .2s;
        text-decoration: none;
      }
      .logout-btn:hover { color: rgba(255,255,255,.8); border-color: rgba(255,255,255,.3); }
    </style>
  </head>

  <body>
    <!-- ── Login screen overlay ─────────────────────────────────────────── -->
    <div id="loginScreen">
      <div class="login-card">
        <div class="login-logo">✦</div>
        <h1 class="login-title">OmniQuery</h1>
        <p class="login-sub">
          Sign in to ask questions and access your<br>personal conversation history.
        </p>
        <a href="/auth/login" class="login-btn">
          <!-- GitHub mark icon -->
          <svg height="20" viewBox="0 0 16 16" width="20" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
              .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
              .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
              0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          Continue with GitHub
        </a>
      </div>
    </div>

    <!-- Background glow -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- APP LAYOUT -->
    <div id="appLayout">
      <!-- SIDEBAR -->
      <div id="sidebar">
        <div class="sidebar-top">
          <button id="toggleSidebarBtn" class="sidebar-toggle">
            <img
              src="/static/favicon3.png"
              alt="OmniQuery"
              class="toggle-icon"
            />
          </button>
          <button id="newChatBtn" class="new-chat-btn">
            <span class="icon">+</span>
            <span class="label">Start New Conversation</span>
          </button>
          <h3>Your Chats</h3>
          <div id="historyList"></div>
        </div>
      </div>

      <!-- MAIN APP -->
      <div class="app-shell">
        <!-- HEADER -->
        <header class="header">
          <div class="header-inner">
            <div class="brand">
              <div class="brand-icon">✦</div>
              <div>
                <h1 class="brand-title">OmniQuery</h1>
                <p class="brand-sub">LangGraph Powered</p>
              </div>
            </div>

            <div class="header-controls">
              <!-- User widget (shown when logged in) -->
              <div id="userWidget">
                <img id="userAvatar" class="user-avatar" src="" alt="avatar" />
                <span id="userName" class="user-name"></span>
                <a href="/auth/logout" class="logout-btn">Sign out</a>
              </div>

              <button id="clearBtn" class="btn-ghost">Clear</button>

              <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
              </div>
            </div>
          </div>
        </header>

        <!-- CHAT AREA -->
        <main class="chat-area">
          <div class="welcome" id="welcome">
            <h2 class="welcome-title">Ask anything</h2>
            <p class="welcome-sub">
              I'll answer directly or search the web if needed.
            </p>

            <div class="suggestion-grid">
              <button class="suggestion" data-query="What is TCP vs UDP?">
                💡 TCP vs UDP
              </button>
              <button class="suggestion" data-query="Latest AI news">
                🌐 AI news
              </button>
              <button class="suggestion" data-query="Reverse string in Python">
                🐍 Python Reverse String
              </button>
              <button class="suggestion" data-query="Bitcoin price">
                📈 BTC
              </button>
            </div>
          </div>

          <!-- Messages -->
          <div id="messages" class="messages"></div>
        </main>

        <!-- INPUT -->
        <footer class="input-bar">
          <div class="input-inner">
            <div class="input-wrap">
              <textarea
                id="queryInput"
                class="query-input"
                placeholder="Ask anything…"
                rows="1"
              ></textarea>

              <button id="sendBtn" class="send-btn">↑</button>
            </div>

            <p class="input-hint">
              Press Enter to send · Shift+Enter for newline
            </p>
          </div>
        </footer>
      </div>
      <!-- end app-shell -->
    </div>
    <!-- end appLayout -->

    <script src="/static/app.js"></script>
  </body>
</html>
